<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>New Classmate Program</title>

    <!-- Bootstrap -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- PyScript -->
    <link
        rel="stylesheet"
        href="https://pyscript.net/releases/2025.7.3/core.css"
    >

    <script
        type="module"
        src="https://pyscript.net/releases/2025.7.3/core.js"
    ></script>

    <style>
        body {
            background-color: #f4f6ff;
        }

        .container {
            max-width: 700px;
        }

        .card {
            border-radius: 16px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4 text-center">
        Classmate Introduction Program
    </h1>

    <div class="card shadow p-4">

        <label class="form-label">Name:</label>
        <input type="text" id="name" class="form-control mb-3">

        <label class="form-label">Section:</label>

        <select id="section" class="form-select mb-3">
            <option>Ruby</option>
            <option>Sapphire</option>
            <option>Topaz</option>
            <option>Emerald</option>
        </select>

        <label class="form-label">Favorite Subject:</label>

        <input
            type="text"
            id="favorite_subject"
            class="form-control mb-3"
        >

        <button
            py-click="add_classmate"
            class="btn btn-primary"
        >
            Add Classmate
        </button>

    </div>

    <div id="output" class="mt-4"></div>

</div>

<py-script src="./main.py"></py-script>

</body>
</html>
